# ========================================
# NetCopy Client Configuration
# ========================================

[connection]
# Connection timeout in seconds.
timeout = 30
# Enable TCP Keep-Alive to maintain idle connections.
keep_alive = true
# Experimental: Use R-UDP instead of TCP (requires server support).
udp = false
# Socket buffer size (0 = OS default).
socket_buffer_size = 0

[protocol]
# The default protocol scheme if none is specified in the URL.
# Can be: internal, ssh, sftp. TLS wraps the internal protocol when [protocol.tls].enable is true.
default_protocol = internal

[protocol.internal]
# The NetCopy custom high-performance protocol settings.
# 
# Secret key used for encryption (ChaCha20-Poly1305 or AES).
# Must match the server's secret_key if authentication is enabled.
secret_key = 0xebf5fa7d3e9fcf67e874baddee773b1d5badd6eb75baddee974b2592c9643299
# Authentication method: none, password, mlkem
auth_method = none
# Transport encryption level (FAST, HIGH, AES, AES-GCM)
security_level = HIGH
username = admin
password = 
password_encrypted = 

# The max chunk size. Highly recommended to use 'adaptive' 
# so the chunk size dynamically scales based on network throughput.
max_chunk_size = adaptive

# Advanced Internal Protocol Parameters
# =====================================
# initial_chunk_size = 262144
# min_chunk_size = 8192
# chunk_size_increase_factor = 1.1
# chunk_size_decrease_factor = 0.5
# Maximum unacknowledged internal-protocol transfer data in flight (bytes).
inflight_window_bytes = 67108864
# Optional internal-protocol chunk batching. 0/1 keeps the legacy one-message-per-chunk path.
batch_bytes = 0
batch_chunks = 1
# Riskier internal-protocol Windows performance hints are opt-in while benchmarking.
preallocate_files = false
cache_hints = false
streaming_verification = false
tcp_info_window = false
# private_key_file = id_mlkem768.pem
# private_key_passphrase = 

[protocol.tls]
# TLS transport settings for the NetCopy internal protocol.
# This is not the SSH/SFTP data path.
#
# Whether to perform mutual authentication (requires client cert/key).
tls_mutual_authentication = false
# Path to the client's public certificate (if mutual auth is true).
tls_client_cert_file = 
# Path to the client's private key (if mutual auth is true).
tls_client_key_file = 
# Whether to validate the server's certificate.
tls_server_cert_validation = true
# Whether to validate the server's certificate chain.
tls_server_chain_validation = true
# Path to a file containing trusted CA certificates.
tls_trusted_chain_file = 

[protocol.ssh]
# SSH / SCP Protocol Settings
# Used when connecting to ssh:// or scp:// endpoints.
username = admin
# Path to SSH private key file (e.g. id_rsa or id_ed25519)
private_key_file = 

[protocol.sftp]
# SFTP Protocol Settings
# Used when connecting to sftp:// endpoints.
# Settings fall back to SSH if left blank.

[performance]
# Maximum bandwidth to use as a percentage of available bandwidth (0 = unlimited).
max_bandwidth_percent = 100
# Number of retry attempts on transient network failures.
retry_attempts = 3
# Delay in seconds between retries.
retry_delay = 5

[logging]
# Enable writing logs to a file.
enable = false
# Logging levels: TRACE, DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level = INFO
# Path to the log file.
log_file = client.log
# Format of the log: text, json
log_format = text

[console_output]
# Enable printing logs to the console window.
enable = true
# Minimum log level to print to the console.
level = INFO

[transfer]
# Re-create empty directories inside transferred folders.
create_empty_directories = true
# Automatically create the destination directory if it doesn't exist.
auto_create_directories = true

[proxy]
# Proxy support for the client connection.
# type: none, socks5, http
type = none
host = 
port = 0
username = 
password = 

[integration]
# Optional webhook URL to ping upon transfer completion or failure.
webhook_url = 

[gui]
# Port the GUI server binds to.
port = 1246
# Automatically open the default browser when the GUI starts.
open_browser_on_start = true
# Frontend theme preference (system, light, dark).
theme = system
# Frontend language preference.
language = en
