# ========================================
# NetCopy Server Configuration
# ========================================

[network]
# Interface address to listen on (0.0.0.0 for all interfaces).
listen_address = 127.0.0.1
# The primary TCP port for the default protocol.
listen_port = 1245
# Maximum number of concurrent connections (0 = unlimited).
max_connections = 10
# Connection timeout in seconds.
timeout = 30
# Experimental: Use R-UDP instead of TCP.
udp = false
# Socket buffer size (0 = OS default).
socket_buffer_size = 0

[protocol]
# The primary default protocol that binds to listen_port.
# Can be: internal, tls, ssh, sftp
default_protocol = internal

[protocol.internal]
# The NetCopy custom high-performance protocol settings.
enable = true
# Secret key used for encryption. Must match the client's secret_key.
secret_key = 0xebf5fa7d3e9fcf67e874baddee773b1d5badd6eb75baddee974b2592c9643299
# Enforce authentication for clients using the internal protocol. "Does this client have the  secret_key  to encrypt/decrypt the raw network packets?"
require_auth = true
# Authentication method: password, mlkem
auth_method = password
# Transport encryption level (auto, FAST, HIGH, AES, AES-GCM)
security_level = auto
# Path to the CSV file containing allowed usernames and hashed passwords.
users_file = users.csv
# Whether to allow completely anonymous access over the internal protocol. "Does this client have a valid  username  and  password  in my  users.csv  database, or can anyone connect?"
allow_anonymous = true
# The max chunk size. Highly recommended to use 'adaptive' 
# so the chunk size dynamically scales based on network throughput.
max_chunk_size = adaptive

[protocol.tls]
# Standard TLS / FTPS Protocol Settings
enable = false
# Path to the server's public certificate file.
tls_server_cert_file = ssh_cert.pem
# Path to the server's private key file.
tls_server_key_file = ssh_host_ec_key.der
# Path to Diffie-Hellman parameters file (optional but recommended for Perfect Forward Secrecy).
tls_dh_file = 
# Whether to enforce validation of client certificates (Two-Way SSL / Mutual Auth).
tls_client_cert_validation = false
# Whether to validate the client's certificate chain.
tls_client_chain_validation = false
# Path to a file containing trusted CA certificates (used to verify clients).
tls_trusted_chain_file = 

[protocol.ssh]
# SSH Protocol Settings
enable = false
# The port to bind the SSH listener to.
port = 2222

[protocol.sftp]
# SFTP Subsystem Settings
enable = false

[performance]
# Maximum bandwidth the server is allowed to consume (percentage). 0 = unlimited.
max_bandwidth_percent = 100
# Absolute maximum file size allowed to be transferred (in bytes). 0 = unlimited.
max_file_size = 0

[logging]
# Enable writing logs to a file.
enable = true
# Logging levels: TRACE, DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level = INFO
# Path to the server log file.
log_file = server.log
# Format of the log: text, json
log_format = text
# Optional path for a separate, security-focused audit log file.
audit_file = 

[console_output]
# Enable printing logs to the console window.
enable = true
# Minimum log level to print to the console.
level = INFO

[daemon]
# Whether to detach and run silently as a background daemon process.
run_as_daemon = false
# Path to write the Process ID (PID) file.
pid_file = D:\Work\Test\server.pid

[paths]
# List of absolute directories the server is allowed to serve/receive files in.
# Connections attempting to access paths outside these directories will be rejected.
allowed_paths = D:\src\net_copy\
allowed_paths = D:\Work\
# Automatically create missing destination directories when receiving files.
auto_create_directories = true

[integration]
# Optional webhook URL to ping upon server startup or critical events.
webhook_url = 
